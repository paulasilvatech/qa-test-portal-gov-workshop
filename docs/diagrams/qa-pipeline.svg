<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520"
     style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: white;">

  <!-- ============================================ -->
  <!-- SPATIAL GRID (v3 — generous vertical gaps)    -->
  <!--                                               -->
  <!-- Title: y=0..80                                -->
  <!--                                               -->
  <!-- Row 1 (Phases 0-6):                           -->
  <!--   boxes: y=100..158, h=58, center_y=129       -->
  <!--   Boxes: 7 × w=120, gap=20                    -->
  <!--     P0: x=56..176                             -->
  <!--     P1: x=196..316                            -->
  <!--     P2: x=336..456                            -->
  <!--     P3: x=476..596                            -->
  <!--     P4: x=616..736                            -->
  <!--     P5: x=756..876                            -->
  <!--     P6: x=896..1016                           -->
  <!--                                               -->
  <!-- Agent labels: y=176 (14px below box bottom)   -->
  <!--                                               -->
  <!-- Retry loop: y=158..200 (between boxes & labels) -->
  <!--   Arrow path at y=192                         -->
  <!--   "retry" label at y=210                      -->
  <!--   writer/runner labels at y=210 (shifted)     -->
  <!--                                               -->
  <!-- Routing channel: y=220..270 (50px clear gap)  -->
  <!--                                               -->
  <!-- Row 2 (Phases 7-8):                           -->
  <!--   boxes: y=270..328, h=58, center_y=299       -->
  <!--   P7:  x=56..286                              -->
  <!--   P8:  x=310..540                             -->
  <!--   Badges: x=600..860                          -->
  <!--                                               -->
  <!-- Row 2 labels: y=348                           -->
  <!-- Orchestrator bar: y=365..400                  -->
  <!-- Legend: y=420+                                 -->
  <!-- ============================================ -->

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M1,1.2 L8,4 L1,6.8" fill="#B4B2A9" stroke="none"/>
    </marker>
    <marker id="arr-red" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M1,1.2 L8,4 L1,6.8" fill="#F25022" stroke="none"/>
    </marker>
  </defs>

  <!-- ============================================ -->
  <!-- TITLE BLOCK                                   -->
  <!-- ============================================ -->
  <text x="60" y="36" font-size="22" font-weight="700" fill="#2C2C2A">QA Pipeline — 8-Phase End-to-End Flow</text>
  <text x="60" y="56" font-size="13" fill="#888780">Orchestrated by qa-master · automatic handoffs · retry loops · Azure DevOps sync</text>
  <rect x="60"  y="68" width="50" height="3" rx="1.5" fill="#0078D4"/>
  <rect x="114" y="68" width="50" height="3" rx="1.5" fill="#7FBA00"/>
  <rect x="168" y="68" width="50" height="3" rx="1.5" fill="#FFB900"/>
  <rect x="222" y="68" width="50" height="3" rx="1.5" fill="#F25022"/>

  <!-- ============================================ -->
  <!-- SECTION BACKGROUNDS                           -->
  <!-- ============================================ -->
  <rect x="40" y="88"  width="1120" height="140" rx="8" fill="#0078D4" opacity="0.02"/>
  <rect x="40" y="264" width="1120" height="90"  rx="8" fill="#FFB900" opacity="0.02"/>

  <!-- ============================================ -->
  <!-- ROW 1 — PHASES 0-6                            -->
  <!-- boxes: y=100..158, h=58, gap=20               -->
  <!-- center_y = 129                                -->
  <!-- ============================================ -->

  <!-- Phase 0: Recon — x=56, w=120 -->
  <rect x="56" y="100" width="120" height="58" rx="6" fill="#0078D4" opacity="0.08"/>
  <rect x="56" y="100" width="120" height="58" rx="6" fill="none" stroke="#0078D4" stroke-width="1"/>
  <text x="116" y="124" text-anchor="middle" font-size="9" font-weight="700" fill="#0078D4" letter-spacing="0.5">PHASE 0</text>
  <text x="116" y="143" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Recon</text>

  <!-- Phase 1: Coverage — x=196, w=120 -->
  <rect x="196" y="100" width="120" height="58" rx="6" fill="#7FBA00" opacity="0.08"/>
  <rect x="196" y="100" width="120" height="58" rx="6" fill="none" stroke="#7FBA00" stroke-width="1"/>
  <text x="256" y="124" text-anchor="middle" font-size="9" font-weight="700" fill="#7FBA00" letter-spacing="0.5">PHASE 1</text>
  <text x="256" y="143" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Coverage</text>

  <!-- Phase 2: Planning — x=336, w=120 -->
  <rect x="336" y="100" width="120" height="58" rx="6" fill="#7FBA00" opacity="0.08"/>
  <rect x="336" y="100" width="120" height="58" rx="6" fill="none" stroke="#7FBA00" stroke-width="1"/>
  <text x="396" y="124" text-anchor="middle" font-size="9" font-weight="700" fill="#7FBA00" letter-spacing="0.5">PHASE 2</text>
  <text x="396" y="143" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Planning</text>

  <!-- Phase 3: Writing — x=476, w=120 -->
  <rect x="476" y="100" width="120" height="58" rx="6" fill="#7FBA00" opacity="0.08"/>
  <rect x="476" y="100" width="120" height="58" rx="6" fill="none" stroke="#7FBA00" stroke-width="1"/>
  <text x="536" y="124" text-anchor="middle" font-size="9" font-weight="700" fill="#7FBA00" letter-spacing="0.5">PHASE 3</text>
  <text x="536" y="143" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Writing</text>

  <!-- Phase 4: Execution — x=616, w=120 -->
  <rect x="616" y="100" width="120" height="58" rx="6" fill="#FFB900" opacity="0.08"/>
  <rect x="616" y="100" width="120" height="58" rx="6" fill="none" stroke="#FFB900" stroke-width="1"/>
  <text x="676" y="124" text-anchor="middle" font-size="9" font-weight="700" fill="#BA7517" letter-spacing="0.5">PHASE 4</text>
  <text x="676" y="143" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Execution</text>

  <!-- Phase 5: QA Inspect — x=756, w=120 -->
  <rect x="756" y="100" width="120" height="58" rx="6" fill="#F25022" opacity="0.08"/>
  <rect x="756" y="100" width="120" height="58" rx="6" fill="none" stroke="#F25022" stroke-width="1"/>
  <text x="816" y="124" text-anchor="middle" font-size="9" font-weight="700" fill="#F25022" letter-spacing="0.5">PHASE 5</text>
  <text x="816" y="143" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">QA Inspect</text>

  <!-- Phase 6: Review — x=896, w=120 -->
  <rect x="896" y="100" width="120" height="58" rx="6" fill="#FFB900" opacity="0.08"/>
  <rect x="896" y="100" width="120" height="58" rx="6" fill="none" stroke="#FFB900" stroke-width="1"/>
  <text x="956" y="124" text-anchor="middle" font-size="9" font-weight="700" fill="#BA7517" letter-spacing="0.5">PHASE 6</text>
  <text x="956" y="143" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Review</text>

  <!-- ============================================ -->
  <!-- SEQUENTIAL ARROWS — Phase 0 → 6               -->
  <!-- Horizontal at y=129, within 20px gaps.        -->
  <!-- ============================================ -->
  <path d="M176,129 H195" stroke="#B4B2A9" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <path d="M316,129 H335" stroke="#B4B2A9" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <path d="M456,129 H475" stroke="#B4B2A9" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <path d="M596,129 H615" stroke="#B4B2A9" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <path d="M736,129 H755" stroke="#B4B2A9" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <path d="M876,129 H895" stroke="#B4B2A9" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>

  <!-- ============================================ -->
  <!-- AGENT LABELS — y=176, 18px below box bottom   -->
  <!-- Phases 0,1,2,5,6 get labels here.             -->
  <!-- Phases 3,4 labels go at y=210 (below retry)   -->
  <!-- ============================================ -->
  <text x="116" y="176" text-anchor="middle" font-size="10" fill="#0078D4" font-weight="500">qa-master</text>
  <text x="256" y="176" text-anchor="middle" font-size="10" fill="#7FBA00" font-weight="500">test-analyzer</text>
  <text x="396" y="176" text-anchor="middle" font-size="10" fill="#7FBA00" font-weight="500">test-planner</text>
  <text x="816" y="176" text-anchor="middle" font-size="10" fill="#F25022" font-weight="500">qa-inspector</text>
  <text x="956" y="176" text-anchor="middle" font-size="10" fill="#BA7517" font-weight="500">code-reviewer</text>

  <!-- ============================================ -->
  <!-- RETRY LOOP: Phase 4 → Phase 3                 -->
  <!-- Arrow routes below boxes at y=180..200.       -->
  <!-- Box bottom = 158. Labels at y=176 are above.  -->
  <!-- Retry arrow path: y=180 down → y=200 across → -->
  <!-- up to y=158.                                  -->
  <!-- Uses x range 536..676 (writer center to       -->
  <!-- runner center).                               -->
  <!-- ============================================ -->
  <path d="M660,158 V190 Q660,200 650,200 H550 Q540,200 540,190 V158"
        stroke="#F25022" stroke-width="1.2" fill="none" stroke-dasharray="5 3" marker-end="url(#arr-red)"/>

  <!-- Retry label + writer/runner labels            -->
  <!-- These 3 texts sit at y=216, fully below the   -->
  <!-- retry arrow (which maxes at y=200).            -->
  <!-- Spaced horizontally: writer at 536, label at  -->
  <!-- 600, runner at 676. No overlaps.              -->
  <text x="536" y="216" text-anchor="middle" font-size="10" fill="#7FBA00" font-weight="500">test-writer</text>
  <text x="605" y="216" text-anchor="middle" font-size="9" fill="#F25022" font-weight="600">retry (max 2)</text>
  <text x="676" y="216" text-anchor="middle" font-size="10" fill="#BA7517" font-weight="500">test-runner</text>

  <!-- ============================================ -->
  <!-- PHASE 6 → ROW 2 connection                    -->
  <!-- Routes through the routing channel            -->
  <!-- (y=230..270). From Phase 6 bottom-center      -->
  <!-- (956,158) → down to y=248 → left to Phase 7   -->
  <!-- top-center (171,270). Fully in the gap.       -->
  <!-- ============================================ -->
  <path d="M956,158 V248 Q956,256 946,256 H181 Q171,256 171,264 V269"
        stroke="#B4B2A9" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>

  <!-- ============================================ -->
  <!-- ROW 2 — PHASES 7-8                            -->
  <!-- boxes: y=270..328, h=58, center_y=299         -->
  <!-- ============================================ -->

  <!-- Phase 7: E2E — Playwright — x=56, w=230 -->
  <rect x="56" y="270" width="230" height="58" rx="6" fill="#FFB900" opacity="0.08"/>
  <rect x="56" y="270" width="230" height="58" rx="6" fill="none" stroke="#FFB900" stroke-width="1"/>
  <text x="171" y="294" text-anchor="middle" font-size="9" font-weight="700" fill="#BA7517" letter-spacing="0.5">PHASE 7</text>
  <text x="171" y="314" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">E2E — Playwright</text>

  <!-- Phase 8: Azure DevOps Sync — x=310, w=230 -->
  <rect x="310" y="270" width="230" height="58" rx="6" fill="#F25022" opacity="0.08"/>
  <rect x="310" y="270" width="230" height="58" rx="6" fill="none" stroke="#F25022" stroke-width="1"/>
  <text x="425" y="294" text-anchor="middle" font-size="9" font-weight="700" fill="#F25022" letter-spacing="0.5">PHASE 8</text>
  <text x="425" y="314" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Azure DevOps Sync</text>

  <!-- Phase 7 → Phase 8 (horizontal, same y=299) -->
  <path d="M286,299 H309" stroke="#B4B2A9" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>

  <!-- Row 2 agent labels — y=348, 20px below box bottom -->
  <text x="171" y="348" text-anchor="middle" font-size="10" fill="#BA7517" font-weight="500">playwright-e2e</text>
  <text x="425" y="348" text-anchor="middle" font-size="10" fill="#F25022" font-weight="500">azdo-sync</text>

  <!-- ============================================ -->
  <!-- DELIVERABLE BADGES — right of Row 2           -->
  <!-- y=274..296 and y=304..326, aligned to boxes   -->
  <!-- ============================================ -->
  <rect x="600" y="274" width="120" height="24" rx="12" fill="#0078D4" opacity="0.07"/>
  <text x="660" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#0078D4">Test Plans</text>

  <rect x="730" y="274" width="120" height="24" rx="12" fill="#7FBA00" opacity="0.07"/>
  <text x="790" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#7FBA00">Test Cases</text>

  <rect x="600" y="304" width="120" height="24" rx="12" fill="#FFB900" opacity="0.07"/>
  <text x="660" y="320" text-anchor="middle" font-size="10" font-weight="600" fill="#BA7517">User Stories</text>

  <rect x="730" y="304" width="120" height="24" rx="12" fill="#F25022" opacity="0.07"/>
  <text x="790" y="320" text-anchor="middle" font-size="10" font-weight="600" fill="#F25022">Bug Reports</text>

  <!-- ============================================ -->
  <!-- ORCHESTRATOR BAR                              -->
  <!-- ============================================ -->
  <rect x="40" y="370" width="1120" height="34" rx="6" fill="#0078D4" opacity="0.04"/>
  <text x="600" y="392" text-anchor="middle" font-size="13" font-weight="600" fill="#0078D4">Orchestrated by qa-master — all 8 phases in a single command</text>

  <!-- ============================================ -->
  <!-- LEGEND                                        -->
  <!-- ============================================ -->
  <line x1="40" y1="425" x2="1160" y2="425" stroke="#E8E6DF" stroke-width="1"/>

  <rect x="70" y="442" width="18" height="14" rx="3" fill="#7FBA00" opacity="0.08" stroke="#7FBA00" stroke-width="1"/>
  <text x="96" y="454" font-size="11" font-weight="500" fill="#2C2C2A">Pipeline phase</text>

  <line x1="210" y1="449" x2="248" y2="449" stroke="#B4B2A9" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="256" y="454" font-size="11" font-weight="500" fill="#2C2C2A">Sequential flow</text>

  <line x1="380" y1="449" x2="418" y2="449" stroke="#F25022" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="426" y="454" font-size="11" font-weight="500" fill="#2C2C2A">Retry loop</text>

  <rect x="530" y="442" width="18" height="14" rx="7" fill="#0078D4" opacity="0.07"/>
  <text x="556" y="454" font-size="11" font-weight="500" fill="#2C2C2A">Azure DevOps deliverable</text>

  <text x="740" y="454" font-size="10" fill="#0078D4" font-weight="500">agent-name</text>
  <text x="810" y="454" font-size="11" font-weight="500" fill="#2C2C2A">Responsible agent</text>
</svg>
