<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540"
     style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: white;">

  <!-- ============================================ -->
  <!-- SPATIAL GRID                                  -->
  <!-- Row 1 (Pipeline): bg y=90..205, center_y=140 -->
  <!--   qa-master: x=70 w=145 → right-center (215, 140) -->
  <!--   analyzer:  x=240 w=118 → (240,140)–(358,140) -->
  <!--   planner:   x=374 w=118 → (374,140)–(492,140) -->
  <!--   writer:    x=508 w=118 → (508,140)–(626,140) -->
  <!--   runner:    x=642 w=118 → (642,140)–(760,140) -->
  <!--   inspector: x=776 w=118 → (776,140)–(894,140) -->
  <!--   reviewer:  x=910 w=118 → (910,140)–(1028,140) -->
  <!--                                               -->
  <!-- Routing channel: y=205..245 (40px gap)        -->
  <!--                                               -->
  <!-- Row 2 (E2E+DevOps): bg y=245..335, center_y=280 -->
  <!--   playwright: x=300 w=170 → top (385,252)     -->
  <!--   azdo-sync:  x=560 w=170 → top (645,252)     -->
  <!--   doc-creator: x=820 w=165 → top (902,252)    -->
  <!-- ============================================ -->

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M1,1.2 L8,4 L1,6.8" fill="#B4B2A9" stroke="none"/>
    </marker>
    <marker id="arr-blue" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M1,1.2 L8,4 L1,6.8" fill="#0078D4" stroke="none"/>
    </marker>
    <marker id="arr-red" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M1,1.2 L8,4 L1,6.8" fill="#F25022" stroke="none"/>
    </marker>
  </defs>

  <!-- ============================================ -->
  <!-- TITLE BLOCK                                   -->
  <!-- ============================================ -->
  <text x="60" y="38" font-size="22" font-weight="700" fill="#2C2C2A">Agent Interaction — QA Pipeline</text>
  <text x="60" y="58" font-size="13" fill="#888780">11 specialized agents · multi-phase orchestration · automatic handoffs and retry loops</text>
  <rect x="60"  y="70" width="50" height="3" rx="1.5" fill="#0078D4"/>
  <rect x="114" y="70" width="50" height="3" rx="1.5" fill="#7FBA00"/>
  <rect x="168" y="70" width="50" height="3" rx="1.5" fill="#FFB900"/>
  <rect x="222" y="70" width="50" height="3" rx="1.5" fill="#F25022"/>

  <!-- ============================================ -->
  <!-- SECTION BACKGROUNDS                           -->
  <!-- ============================================ -->
  <rect x="40" y="90"  width="1120" height="115" rx="8" fill="#0078D4" opacity="0.025"/>
  <rect x="40" y="245" width="1120" height="90"  rx="8" fill="#FFB900" opacity="0.025"/>

  <!-- Section labels -->
  <text x="52" y="148" font-size="9" font-weight="700" fill="#0078D4" opacity="0.40"
        letter-spacing="1.5" text-anchor="middle"
        transform="rotate(-90 52 148)">PIPELINE</text>
  <text x="52" y="290" font-size="9" font-weight="700" fill="#BA7517" opacity="0.45"
        letter-spacing="1.5" text-anchor="middle"
        transform="rotate(-90 52 290)">E2E &amp; SYNC</text>

  <!-- ============================================ -->
  <!-- ROW 1 — PIPELINE AGENTS                      -->
  <!-- All boxes: h=56, center_y=140                 -->
  <!-- ============================================ -->

  <!-- qa-master: x=70, w=145, h=56 -->
  <rect x="70" y="112" width="145" height="56" rx="8" fill="white" stroke="#0078D4" stroke-width="2"/>
  <circle cx="88" cy="140" r="8" fill="#0078D4" opacity="0.15"/>
  <text x="88" y="144" font-size="9" fill="#0078D4" text-anchor="middle" font-weight="700">&#10022;</text>
  <text x="152" y="135" text-anchor="middle" font-size="12" font-weight="600" fill="#0078D4">qa-master</text>
  <text x="152" y="152" text-anchor="middle" font-size="9" fill="#888780">Orchestrator</text>

  <!-- test-analyzer: x=240, w=118, h=56 -->
  <rect x="240" y="112" width="118" height="56" rx="6" fill="white" stroke="#7FBA00" stroke-width="1.5"/>
  <text x="299" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">test-analyzer</text>
  <text x="299" y="152" text-anchor="middle" font-size="9" fill="#888780">Coverage gaps</text>

  <!-- test-planner: x=374, w=118, h=56 -->
  <rect x="374" y="112" width="118" height="56" rx="6" fill="white" stroke="#7FBA00" stroke-width="1.5"/>
  <text x="433" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">test-planner</text>
  <text x="433" y="152" text-anchor="middle" font-size="9" fill="#888780">Test design</text>

  <!-- test-writer: x=508, w=118, h=56 -->
  <rect x="508" y="112" width="118" height="56" rx="6" fill="white" stroke="#7FBA00" stroke-width="1.5"/>
  <text x="567" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">test-writer</text>
  <text x="567" y="152" text-anchor="middle" font-size="9" fill="#888780">Implementation</text>

  <!-- test-runner: x=642, w=118, h=56 -->
  <rect x="642" y="112" width="118" height="56" rx="6" fill="white" stroke="#7FBA00" stroke-width="1.5"/>
  <text x="701" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">test-runner</text>
  <text x="701" y="152" text-anchor="middle" font-size="9" fill="#888780">Execution</text>

  <!-- qa-inspector: x=776, w=118, h=56 -->
  <rect x="776" y="112" width="118" height="56" rx="6" fill="white" stroke="#F25022" stroke-width="1.5"/>
  <text x="835" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">qa-inspector</text>
  <text x="835" y="152" text-anchor="middle" font-size="9" fill="#888780">Bug hunting</text>

  <!-- code-reviewer: x=910, w=118, h=56 -->
  <rect x="910" y="112" width="118" height="56" rx="6" fill="white" stroke="#FFB900" stroke-width="1.5"/>
  <text x="969" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">code-reviewer</text>
  <text x="969" y="152" text-anchor="middle" font-size="9" fill="#888780">Quality review</text>

  <!-- ============================================ -->
  <!-- PYTHON-TEST-ORCHESTRATOR BRACKET              -->
  <!-- Dashed rect around analyzer through runner    -->
  <!-- x=234..766 (covering 4 agent boxes)           -->
  <!-- ============================================ -->
  <rect x="234" y="100" width="532" height="80" rx="10" fill="none"
        stroke="#0078D4" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.35"/>
  <text x="500" y="96" text-anchor="middle" font-size="9" font-weight="600" fill="#0078D4" opacity="0.6">python-test-orchestrator</text>

  <!-- ============================================ -->
  <!-- ROW 2 — E2E, DEVOPS, DOCS                    -->
  <!-- All boxes: h=56, center_y=280                 -->
  <!-- ============================================ -->

  <!-- playwright-e2e: x=300, w=170, h=56 -->
  <rect x="300" y="252" width="170" height="56" rx="6" fill="white" stroke="#FFB900" stroke-width="1.5"/>
  <text x="385" y="275" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">playwright-e2e</text>
  <text x="385" y="292" text-anchor="middle" font-size="9" fill="#888780">Browser E2E tests</text>

  <!-- azdo-sync: x=560, w=170, h=56 -->
  <rect x="560" y="252" width="170" height="56" rx="6" fill="white" stroke="#F25022" stroke-width="1.5"/>
  <text x="645" y="275" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">azdo-sync</text>
  <text x="645" y="292" text-anchor="middle" font-size="9" fill="#888780">Azure DevOps sync</text>

  <!-- document-creator: x=820, w=165, h=56 -->
  <rect x="820" y="252" width="165" height="56" rx="6" fill="white" stroke="#0078D4" stroke-width="1.5"/>
  <text x="902" y="275" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">document-creator</text>
  <text x="902" y="292" text-anchor="middle" font-size="9" fill="#888780">Docs &amp; diagrams</text>

  <!-- ============================================ -->
  <!-- ARROWS — Row 1: Sequential pipeline flow      -->
  <!-- All horizontal, same y=140, in gaps between   -->
  <!-- boxes. ZERO overlap with any component.       -->
  <!-- ============================================ -->
  <!-- qa-master → analyzer -->
  <path d="M215,140 H239" stroke="#0078D4" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <!-- analyzer → planner -->
  <path d="M358,140 H373" stroke="#B4B2A9" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <!-- planner → writer -->
  <path d="M492,140 H507" stroke="#B4B2A9" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <!-- writer → runner -->
  <path d="M626,140 H641" stroke="#B4B2A9" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <!-- runner → inspector -->
  <path d="M760,140 H775" stroke="#B4B2A9" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <!-- inspector → reviewer -->
  <path d="M894,140 H909" stroke="#B4B2A9" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>

  <!-- ============================================ -->
  <!-- RETRY LOOP: runner ⇄ writer                   -->
  <!-- Routes BELOW Row 1 boxes in the gap zone      -->
  <!-- writer bottom-center (567,168) ← runner       -->
  <!-- bottom-center (701,168)                       -->
  <!-- Path at y=190..198, safely in the gap.        -->
  <!-- ============================================ -->
  <path d="M688,168 V190 Q688,198 678,198 H580 Q570,198 570,190 V168"
        stroke="#F25022" stroke-width="1.2" fill="none" stroke-dasharray="5 3" marker-end="url(#arr-red)"/>
  <text x="634" y="215" text-anchor="middle" font-size="9" fill="#F25022" font-weight="600">retry (max 2)</text>

  <!-- ============================================ -->
  <!-- ARROWS — Row 1 to Row 2                       -->
  <!-- All route through the 40px gap (y=205..245).  -->
  <!-- No arrow passes through any box.              -->
  <!-- ============================================ -->

  <!-- qa-master → playwright-e2e -->
  <!-- From qa-master bottom-center (142,168) → down to gap y=220 → right to playwright top (385,252) -->
  <path d="M142,168 V220 Q142,230 152,230 H375 Q385,230 385,240 V251"
        stroke="#0078D4" stroke-width="1.3" fill="none" marker-end="url(#arr-blue)" opacity="0.55"/>

  <!-- qa-master → azdo-sync -->
  <!-- From qa-master bottom (165,168) → down to gap y=225 → right to azdo-sync top (645,252) -->
  <path d="M165,168 V225 Q165,235 175,235 H635 Q645,235 645,243 V251"
        stroke="#0078D4" stroke-width="1.3" fill="none" marker-end="url(#arr-blue)" opacity="0.40"/>

  <!-- reviewer → azdo-sync -->
  <!-- From reviewer bottom-center (969,168) → down to gap y=220 → left to azdo-sync top (700,252) -->
  <path d="M969,168 V220 Q969,230 959,230 H710 Q700,230 700,240 V251"
        stroke="#B4B2A9" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <text x="840" y="225" text-anchor="middle" font-size="9" fill="#888780">results sync</text>

  <!-- playwright-e2e → azdo-sync (horizontal in Row 2) -->
  <path d="M470,280 H559" stroke="#B4B2A9" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <text x="515" y="272" text-anchor="middle" font-size="9" fill="#888780">bugs handoff</text>

  <!-- ============================================ -->
  <!-- METRIC BADGES — right column                  -->
  <!-- ============================================ -->
  <rect x="1050" y="110" width="100" height="24" rx="12" fill="#0078D4" opacity="0.07"/>
  <text x="1100" y="126" text-anchor="middle" font-size="10" font-weight="600" fill="#0078D4">3 Skills</text>
  <rect x="1050" y="140" width="100" height="24" rx="12" fill="#7FBA00" opacity="0.07"/>
  <text x="1100" y="156" text-anchor="middle" font-size="10" font-weight="600" fill="#7FBA00">3 Instructions</text>
  <rect x="1050" y="170" width="100" height="24" rx="12" fill="#FFB900" opacity="0.07"/>
  <text x="1100" y="186" text-anchor="middle" font-size="10" font-weight="600" fill="#BA7517">2 Hooks</text>
  <rect x="1050" y="258" width="100" height="24" rx="12" fill="#F25022" opacity="0.07"/>
  <text x="1100" y="274" text-anchor="middle" font-size="10" font-weight="600" fill="#F25022">4 Prompts</text>

  <!-- ============================================ -->
  <!-- LEGEND                                        -->
  <!-- ============================================ -->
  <line x1="40" y1="360" x2="1160" y2="360" stroke="#E8E6DF" stroke-width="1"/>

  <!-- Orchestrator -->
  <rect x="70" y="378" width="20" height="14" rx="3" fill="white" stroke="#0078D4" stroke-width="2"/>
  <text x="98" y="390" font-size="11" font-weight="500" fill="#2C2C2A">Orchestrator</text>

  <!-- Specialist -->
  <rect x="195" y="378" width="20" height="14" rx="3" fill="white" stroke="#7FBA00" stroke-width="1.5"/>
  <text x="223" y="390" font-size="11" font-weight="500" fill="#2C2C2A">Specialist</text>

  <!-- QA / Security -->
  <rect x="310" y="378" width="20" height="14" rx="3" fill="white" stroke="#F25022" stroke-width="1.5"/>
  <text x="338" y="390" font-size="11" font-weight="500" fill="#2C2C2A">QA / Security</text>

  <!-- Orchestrator bracket -->
  <rect x="452" y="376" width="30" height="18" rx="5" fill="none" stroke="#0078D4" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <text x="490" y="390" font-size="11" font-weight="500" fill="#2C2C2A">Sub-orchestrator scope</text>

  <!-- Sequential flow -->
  <line x1="650" y1="385" x2="688" y2="385" stroke="#B4B2A9" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="696" y="390" font-size="11" font-weight="500" fill="#2C2C2A">Sequential</text>

  <!-- Delegation -->
  <line x1="770" y1="385" x2="808" y2="385" stroke="#0078D4" stroke-width="1.3" marker-end="url(#arr-blue)" opacity="0.55"/>
  <text x="816" y="390" font-size="11" font-weight="500" fill="#2C2C2A">Delegation</text>

  <!-- Retry loop -->
  <line x1="905" y1="385" x2="943" y2="385" stroke="#F25022" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="951" y="390" font-size="11" font-weight="500" fill="#2C2C2A">Retry loop</text>
</svg>
