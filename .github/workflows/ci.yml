name: CI — Portal Gov

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'src/**'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-api:
    name: API — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'api/pyproject.toml'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-cov ruff

      - name: Lint with Ruff
        run: |
          ruff check application_core/ infrastructure/ tests/ --output-format=github || true

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=test-results.xml --cov=application_core --cov=infrastructure --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: api/test-results.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

      - name: Check coverage threshold
        run: |
          python -m pytest tests/ --cov=application_core --cov-fail-under=80 -q || echo "⚠️ Coverage below 80% threshold"

  test-frontend:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Run tests
        run: npx vitest run --reporter=verbose || true
